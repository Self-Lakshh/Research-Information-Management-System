# ──────────────────────────────────────────────────────────────────────────────
# netlify.toml — RIMS (Research Information Management System)
# ──────────────────────────────────────────────────────────────────────────────

# ── Build settings ─────────────────────────────────────────────────────────────
[build]
  publish = "build"
  command = "npm run build"

  # Tell Netlify where to find the serverless functions.
  functions = "netlify/functions"

# ── Build environment ────────────────────────────────────────────────────────
[build.environment]
  NODE_VERSION = "20"
  # Omit project ID and other non-secret identifiers from scanner to prevent build failures.
  # These are public identifiers used in the frontend.
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_PROJECT_ID,VITE_FIREBASE_PROJECT_ID,VITE_APP_NAME,VITE_APP_ENV,VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_APP_ID,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_MEASUREMENT_ID"
  SECRETS_SCAN_OMIT_PATHS = "scripts/**,.firebaserc,README.md,build/assets/**"

# ── Netlify Dev (local development) ───────────────────────────────────────────
[dev]
  command = "pnpm run dev"
  port = 8888
  targetPort = 5173
  publish = "build"

# ── Netlify Functions setup ────────────────────────────────────────────────────────
[functions]
  # Use esbuild for fast, modern TypeScript bundling.
  node_bundler = "esbuild"
  # Specify dependencies to include if needed (usually auto-detected from root package.json)
  # external_node_modules = ["firebase-admin"]

# ── API routing — proxy /api to serverless functions ─────────────────────────
# This must come BEFORE the SPA routing rule below.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# ── SPA routing — redirect all remaining routes to index.html ───────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
