# ──────────────────────────────────────────────────────────────────────────────
# netlify.toml — RIMS (Research Information Management System)
# ──────────────────────────────────────────────────────────────────────────────

# ── Build settings ─────────────────────────────────────────────────────────────
[build]
  publish = "build"
  command = "npm run build"

  # Tell Netlify where to find the serverless functions.
  functions = "netlify/functions"

# ── Environment variables (dev only — set real values in Netlify UI) ──────────
# [build.environment]
#   NODE_VERSION = "18"

# ── Netlify Dev (local development) ───────────────────────────────────────────
[dev]
  command = "pnpm run dev"
  port = 8888
  targetPort = 5173
  publish = "build"

# ── SPA routing — redirect all non-asset routes to index.html ─────────────────
# This must be LAST so functions are matched first by Netlify's routing engine.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
